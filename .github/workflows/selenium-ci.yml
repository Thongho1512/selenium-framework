name: Selenium Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean install -DskipTests

    - name: "Security Check: Masked Password"
      run: echo "APP_PASSWORD=$SAUCEDEMO_PASSWORD"
      env:
        SAUCEDEMO_PASSWORD: "${{ secrets.SAUCEDEMO_PASSWORD }}"

    - name: "Run Selenium Tests (${{ matrix.browser }} - Headless)"
      run: mvn test -Denv=staging -Dbrowser=${{ matrix.browser }}
      env:
        SAUCEDEMO_USERNAME: "${{ secrets.SAUCEDEMO_USERNAME }}"
        SAUCEDEMO_PASSWORD: "${{ secrets.SAUCEDEMO_PASSWORD }}"
      
    - name: Upload Artifacts on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.browser }}
        path: |
          target/surefire-reports/
          target/screenshots/
