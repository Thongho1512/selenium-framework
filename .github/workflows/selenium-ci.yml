name: Selenium Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean install -DskipTests

    - name: Run Sequential Selenium Tests (Chrome then Firefox)
      run: |
        mvn test -Denv=staging -Dbrowser=chrome
        mvn test -Denv=staging -Dbrowser=firefox
      
    - name: Upload Artifacts on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-sequential
        path: |
          target/surefire-reports/
          target/screenshots/
